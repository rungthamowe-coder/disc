// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let userName = '';
let shuffledQuestions = []; // questions with shuffled options
let answers = [];           // stores DISC type of chosen option e.g. 'D','I','S','C'
let currentQ = 0;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-warning').style.display = 'block'; return; }
  document.getElementById('name-warning').style.display = 'none';
  userName = val;
  // Shuffle options for each question independently
  shuffledQuestions = QUESTIONS.map(q => ({ q: q.q, options: shuffle(q.options) }));
  answers = new Array(QUESTIONS.length).fill(null);
  currentQ = 0;
  renderQuestion();
  show('screen-quiz');
}

function renderQuestion() {
  const q = shuffledQuestions[currentQ];
  document.getElementById('q-number').textContent = `คำถามที่ ${currentQ + 1}`;
  document.getElementById('q-counter').textContent = `${currentQ + 1} / ${QUESTIONS.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = `${(currentQ / QUESTIONS.length) * 100}%`;
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('answered-count').textContent = `ตอบแล้ว ${answered} / ${QUESTIONS.length}`;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const keys = ['A','B','C','D'];
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option' + (answers[currentQ] === opt.type ? ' selected' : '');
    div.innerHTML = `<div class="option-key">${keys[i]}</div><div class="option-text">${opt.text}</div>`;
    div.onclick = () => selectAnswer(opt.type);
    list.appendChild(div);
  });

  const isLast = currentQ === QUESTIONS.length - 1;
  document.getElementById('btn-next').textContent = isLast ? 'ดูผลลัพธ์ ✓' : 'ถัดไป →';
  document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  document.getElementById('submit-warning').style.display = 'none';
}

function selectAnswer(discType) {
  answers[currentQ] = discType;
  // Re-render options to update selected state
  const q = shuffledQuestions[currentQ];
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', q.options[i].type === discType);
  });
  const answered = answers.filter(a => a !== null).length;
  document.getElementById('answered-count').textContent = `ตอบแล้ว ${answered} / ${QUESTIONS.length}`;
  if (currentQ < QUESTIONS.length - 1) setTimeout(() => { currentQ++; renderQuestion(); }, 300);
}

function nextOrSubmit() {
  if (answers[currentQ] === null) { document.getElementById('submit-warning').style.display = 'block'; return; }
  document.getElementById('submit-warning').style.display = 'none';
  if (currentQ < QUESTIONS.length - 1) { currentQ++; renderQuestion(); return; }
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0) {
    document.getElementById('submit-warning').style.display = 'block';
    document.getElementById('submit-warning').textContent = `ยังมี ${unanswered} ข้อที่ยังไม่ได้ตอบ`;
    currentQ = answers.indexOf(null);
    renderQuestion();
    return;
  }
  showResults();
}

function prevQuestion() { if (currentQ > 0) { currentQ--; renderQuestion(); } }

function saveToSheets(data) {
  const el = document.getElementById('save-status');
  el.style.display = 'block';
  el.className = 'save-status saving';
  el.textContent = '⏳ กำลังบันทึกผลลัพธ์...';
  fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
    .then(() => { el.className = 'save-status saved'; el.textContent = '✅ บันทึกผลลัพธ์ลง Google Sheets เรียบร้อยแล้ว'; })
    .catch(() => { el.className = 'save-status error'; el.textContent = '⚠️ ไม่สามารถบันทึกได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต'; });
}

function showResults() {
  const scores = { D: 0, I: 0, S: 0, C: 0 };
  answers.forEach(type => { if (type) scores[type]++; });
  const total = QUESTIONS.length;
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topType = sorted[0][0];
  const info = DISC_INFO[topType];

  document.getElementById('result-hero').innerHTML = `
    <div class="result-name">ผลการประเมินของ ${userName}</div>
    <div class="highlight-card" style="background:${info.bg}; margin-bottom:8px;">
      <div class="type-initial" style="color:${info.color}">${topType}</div>
      <div class="type-name" style="color:${info.color}">${info.name}</div>
      <div class="type-desc">${info.desc}</div>
    </div>`;

  const bars = document.getElementById('score-bars');
  bars.innerHTML = '<div style="font-weight:700; margin-bottom:14px; font-size:0.9rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted);">คะแนนแต่ละมิติ</div>';
  sorted.forEach(([type, score]) => {
    const pct = Math.round((score / total) * 100);
    const c = DISC_INFO[type].color;
    bars.innerHTML += `<div class="score-row">
      <div class="score-label" style="color:${c}">${type}</div>
      <div class="score-bar-track"><div class="score-bar-inner" style="background:${c}; width:${pct}%"><span>${pct}%</span></div></div>
      <div class="score-num">${score}</div></div>`;
  });

  document.getElementById('profile-detail').innerHTML = `
    <div class="profile-card ${topType}-card" style="grid-column:1/-1;">
      <h4>${topType} — จุดแข็งของคุณ</h4>
      <ul>${info.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>
    <div class="profile-card ${topType}-card">
      <h4>โอกาสพัฒนา</h4>
      <ul>${info.growth.map(g => `<li>${g}</li>`).join('')}</ul>
    </div>
    <div class="profile-card" style="border-color:#ccc; background:#f9f9f9;">
      <h4 style="color:var(--muted)">คะแนนทั้งหมด</h4>
      <ul>${sorted.map(([t, s]) => `<li><strong style="color:${DISC_INFO[t].color}">${t}</strong>: ${s} ข้อ (${Math.round(s/total*100)}%)</li>`).join('')}</ul>
    </div>`;

  show('screen-result');
  saveToSheets({ name: userName, D: scores.D, I: scores.I, S: scores.S, C: scores.C, dominant: topType });
}

function restart() {
  userName = ''; answers = []; currentQ = 0;
  document.getElementById('name-input').value = '';
  document.getElementById('save-status').style.display = 'none';
  show('screen-name');
}

document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });
</script>
